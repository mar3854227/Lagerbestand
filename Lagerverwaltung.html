<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagerverwaltung</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232563eb'/%3E%3Cpath d='M16 22 32 13l16 9v20l-16 9-16-9z' fill='none' stroke='white' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M16 22l16 9 16-9M32 31v20' fill='none' stroke='white' stroke-width='4' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px; color: #111827; background: #f1f5f9;
    -webkit-font-smoothing: antialiased;
  }
  #app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ── Sidebar ── */
  aside.sidebar {
    background: #0f172a;
    padding: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 16px 16px;
    border-bottom: 1px solid rgba(255,255,255,.07);
    margin-bottom: 8px;
  }
  .brand-icon {
    width: 34px; height: 34px; flex-shrink: 0;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    font-size: 17px; line-height: 1;
  }
  .brand-name { font-weight: 700; font-size: 14px; color: #f1f5f9; line-height: 1.2; }
  .brand-sub  { font-size: 11px; color: #64748b; margin-top: 1px; }

  nav.menu { padding: 0 8px; flex: 1; }
  nav.menu .group { margin-bottom: 2px; }
  nav.menu .group-title {
    font-size: 10px; text-transform: uppercase; color: #475569;
    padding: 14px 10px 4px; letter-spacing: .08em; font-weight: 600;
  }
  nav.menu a {
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
    padding: 7px 10px; border-radius: 6px;
    color: #94a3b8; text-decoration: none; font-size: 13px;
    cursor: pointer; user-select: none; transition: background .12s, color .12s;
  }
  nav.menu a .mlink { display: flex; align-items: center; gap: 8px; }
  nav.menu a .mico { opacity: .7; display: flex; align-items: center; }
  nav.menu a:hover { background: rgba(255,255,255,.06); color: #e2e8f0; }
  nav.menu a:hover .mico { opacity: 1; }
  nav.menu a.active { background: rgba(59,130,246,.18); color: #93c5fd; font-weight: 600; }
  nav.menu a.active .mico { opacity: 1; color: #60a5fa; }
  nav.menu .badge {
    background: #dc2626; color: #fff; font-size: 10px;
    padding: 1px 6px; border-radius: 10px; font-weight: 700; margin-left: auto;
  }
  .sidebar-footer {
    padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.07);
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .sidebar-user { font-size: 12px; color: #64748b; }

  /* ── Main ── */
  main.main { padding: 0; min-width: 0; }
  .topbar {
    background: #fff; border-bottom: 1px solid #e2e8f0;
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h1 { font-size: 15px; font-weight: 600; color: #0f172a; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar .crumbs { color: #94a3b8; font-size: 12px; }
  .topbar-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: default;
  }
  .container { padding: 22px 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }

  /* ── Cards ── */
  .card {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 18px;
  }
  .card h2 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: #0f172a; text-transform: uppercase; letter-spacing: .04em; }

  /* ── KPI Grid ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .kpi {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 16px 18px; display: flex; gap: 14px; align-items: center;
  }
  .kpi-icon {
    width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .kpi-icon.blue   { background: #eff6ff; }
  .kpi-icon.green  { background: #f0fdf4; }
  .kpi-icon.yellow { background: #fffbeb; }
  .kpi-icon.red    { background: #fef2f2; }
  .kpi-body { min-width: 0; }
  .kpi-label { font-size: 11px; color: #64748b; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
  .kpi-val   { font-size: 28px; font-weight: 700; line-height: 1.1; margin-top: 2px; color: #0f172a; }
  .kpi-val.red    { color: #dc2626; }
  .kpi-val.yellow { color: #d97706; }
  .kpi-val.green  { color: #16a34a; }
  .kpi-hint  { font-size: 11px; color: #94a3b8; margin-top: 2px; }

  /* Legacy stat (kept for compatibility) */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; }
  .stat .label { font-size: 12px; color: #6b7280; }
  .stat .value { font-size: 26px; font-weight: 600; margin-top: 4px; }
  .stat.warn   { border-left: 3px solid #d97706; }
  .stat.danger { border-left: 3px solid #dc2626; }
  .stat.ok     { border-left: 3px solid #16a34a; }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th, td { text-align: left; padding: 9px 11px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  th { font-weight: 600; color: #475569; background: #f8fafc; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  tr.row-danger td { background: #fff5f5 !important; }
  tr.row-warn td   { background: #fffbeb !important; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

  /* ── Pills ── */
  .pill {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 2px 9px; border-radius: 12px; font-weight: 600;
  }
  .pill.green  { background: #dcfce7; color: #166534; }
  .pill.yellow { background: #fef9c3; color: #854d0e; }
  .pill.red    { background: #fee2e2; color: #991b1b; }
  .pill.gray   { background: #f1f5f9; color: #475569; }
  .pill.blue   { background: #dbeafe; color: #1e40af; }

  /* ── Buttons ── */
  button, .btn {
    background: #2563eb; color: #fff; border: 0;
    padding: 8px 14px; border-radius: 7px; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px; transition: background .12s;
  }
  button:hover, .btn:hover { background: #1d4ed8; }
  button.sec, .btn.sec { background: #fff; color: #374151; border: 1px solid #d1d5db; }
  button.sec:hover, .btn.sec:hover { background: #f9fafb; }
  button.ghost { background: transparent; color: #2563eb; padding: 4px 8px; }
  button.ghost:hover { background: #eff6ff; }
  button.danger { background: #dc2626; }
  button.danger:hover { background: #b91c1c; }
  button.small { padding: 4px 9px; font-size: 12px; }
  button:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Forms ── */
  input, select, textarea {
    width: 100%; padding: 8px 10px;
    border: 1px solid #d1d5db; border-radius: 7px;
    font-family: inherit; font-size: 13.5px; background: #fff; color: #111827;
  }
  input:focus, select:focus, textarea:focus {
    outline: 2px solid #bfdbfe; outline-offset: -1px; border-color: #3b82f6;
  }
  textarea { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
  label { display: block; font-size: 12px; color: #374151; margin-bottom: 4px; font-weight: 600; }
  .field { margin-bottom: 12px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* ── Layout helpers ── */
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar .spacer { flex: 1; }
  .empty {
    text-align: center; padding: 48px 20px; color: #94a3b8;
    font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .empty-ico { font-size: 36px; line-height: 1; }
  .actions { display: flex; gap: 6px; }
  hr.sep { border: 0; border-top: 1px solid #e2e8f0; margin: 14px 0; }

  /* ── Modal ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(15,23,42,.5);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 60px 20px 20px; backdrop-filter: blur(2px);
  }
  .modal {
    background: #fff; border-radius: 12px; max-width: 560px; width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,.18); overflow: hidden;
  }
  .modal-head { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; font-weight: 700; font-size: 15px; }
  .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
  .modal-foot { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 8px; background: #f8fafc; }

  /* ── Toast ── */
  #toast-root { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: #0f172a; color: #e2e8f0; padding: 11px 16px; border-radius: 8px;
    font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
    animation: slideUp .22s ease-out; min-width: 220px;
  }
  .toast.success { background: #14532d; border-left: 3px solid #22c55e; }
  .toast.error   { background: #7f1d1d; border-left: 3px solid #ef4444; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Misc ── */
  .ampel { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .ampel.g { background: #16a34a; }
  .ampel.y { background: #d97706; }
  .ampel.r { background: #dc2626; }
  .lead { color: #6b7280; font-size: 13px; margin-bottom: 14px; line-height: 1.6; }
  .help { font-size: 12px; color: #6b7280; margin-top: 4px; line-height: 1.5; }
  .scroll-x { overflow-x: auto; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }

  @media (max-width: 900px) {
    #app { grid-template-columns: 1fr; }
    aside.sidebar { position: static; height: auto; max-height: none; }
    nav.menu { overflow-x: auto; }
    .topbar { padding: 0 16px; }
    .container { padding: 16px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .row { flex-direction: column; }
    .actions { flex-wrap: wrap; }
  }
</style>
</head>

<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">📦</div>
      <div>
        <div class="brand-name" id="brand-title">Lagerverwaltung</div>
        <div class="brand-sub" id="brand-subtitle">Arbeitskleidung &amp; PSA</div>
      </div>

    <nav class="menu" id="menu"></nav>

      <div style="flex:1; min-width:0;">
        <div class="sidebar-user" id="sidebar-user">Angemeldet</div>
        <div class="sidebar-role" id="sidebar-role"></div>
      </div>
      <span style="color:#64748b; font-size:14px; flex-shrink:0;">⚙</span>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-right">
        <div class="crumbs" id="crumbs"></div>
        <div class="topbar-avatar" title="Marcin Panus">M</div>
      </div>
    </div>
    <div class="container" id="view"></div>
  </main>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

function levenshteinRatio(a, b) {
  if (!a || !b) return 0;
  a = a.toLowerCase(); b = b.toLowerCase();
  if (a === b) return 100;
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, () => new Array(n+1).fill(0));
  for (let i=0;i<=m;i++) dp[i][0]=i;
  for (let j=0;j<=n;j++) dp[0][j]=j;
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1]
      : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  }
  const dist = dp[m][n], maxLen = Math.max(m, n);
  return Math.round((1 - dist/maxLen) * 100);
}

function modal({title, body, footer}) {
  return new Promise((resolve) => {
    const root = $('#modal-root');
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `
      <div class="modal">
        <div class="modal-head">${escapeHtml(title)}</div>
        <div class="modal-body"></div>
        <div class="modal-foot"></div>
      </div>`;
    root.appendChild(bg);
    const bodyEl = bg.querySelector('.modal-body');
    const footEl = bg.querySelector('.modal-foot');
    if (typeof body === 'string') bodyEl.innerHTML = body;
    else if (body instanceof Node) bodyEl.appendChild(body);
    const close = (val) => { bg.remove(); resolve(val); };
    bg.addEventListener('click', e => { if (e.target === bg) close(null); });
    if (footer) {
      footer.forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'btn ' + (b.kind || '');
        btn.textContent = b.label;
        btn.onclick = () => close(b.value !== undefined ? b.value : true);
        footEl.appendChild(btn);
      });
    } else {
      const btn = document.createElement('button');
      btn.className = 'btn sec';
      btn.textContent = 'Schließen';
      btn.onclick = () => close(null);
      footEl.appendChild(btn);
    }
  });
}

/* =========================================================================
   PARSER (Rechnungs-Text → strukturierte Daten)
   Unterstützt: Bandyshirt, MEWA
   ========================================================================= */
function detectInvoiceFormat(text) {
  if (/mewa\s+ag/i.test(text) || /artikelnr\.?\s+bezeichnung\s+menge/i.test(text)) return 'mewa';
  if (/pos\s+artikel\s+preis\s+menge/i.test(text)) return 'bandyshirt';
  return 'auto';
}

function parseInvoiceMeta(lines) {
  const meta = { supplierName: null, invoiceNo: null, invoiceDate: null };
  for (const line of lines) {
    const m = line.match(/Rechnung(?:s)?[\s-]?(?:nummer|Nr\.?|#)\s*:?\s*([A-Z0-9_-]+)/i);
    if (m) { meta.invoiceNo = m[1]; break; }
  }
  for (const line of lines) {
    const m = line.match(/Rechnungsdatum\s*:?\s*(\d{2}\.\d{2}\.\d{4})/i);
    if (m) {
      const [d, mo, y] = m[1].split('.');
      meta.invoiceDate = `${y}-${mo}-${d}`;
      break;
    }
  }
  const head = lines.slice(0, 50);
  const headText = head.join('\n');
  if (/mewa/i.test(headText)) {
    const m = head.find(l => /mewa\s+ag/i.test(l));
    if (m) meta.supplierName = m.trim();
  } else if (/bandyshirt/i.test(headText)) {
    const m = head.find(l => /bandyshirt/i.test(l));
    if (m) meta.supplierName = m.split('|')[0].trim();
  }
  if (!meta.supplierName) {
    for (const line of head) {
      if (!line) continue;
      if (/(?:GmbH|AG|KG|OHG|GbR|UG|e\.K\.|e\.V\.)\b/.test(line)) {
        meta.supplierName = line.split('|')[0].trim();
        break;
      }
    }
  }
  return meta;
}

function parseAttributeLine(line, current) {
  const attr = line.match(/^(Farbe|Color|Größe|Groesse|Size|Material|Art\.-Nr\.?)\s*:\s*(.+)$/i);
  if (!attr || !current) return;
  const k = attr[1].toLowerCase();
  const v = attr[2].trim();
  if (k.startsWith('farbe') || k === 'color') current.rawVariant = v;
  else if (k.startsWith('größe') || k.startsWith('groesse') || k === 'size') current.rawSize = v;
}

function parseBandyshirtInvoice(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim());
  const result = { ...parseInvoiceMeta(lines), items: [], format: 'bandyshirt' };
  let inTable = false;
  let current = null;
  const flush = () => { if (current) result.items.push(current); current = null; };

  for (const line of lines) {
    if (!inTable) {
      if (/Pos.*Artikel.*(?:Preis|Einzelpreis).*Menge/i.test(line)) inTable = true;
      continue;
    }
    if (/Zwischensumme.*brutto|^Nettobetrag|^Gesamtsumme|^Versand\s*\/\s*Bearbeitung/i.test(line)) {
      flush();
      break;
    }
    const main = line.match(/^(\d+)\s+(.+?)\s+([\d.,]+)\s*€\s+(\d+)\s+([\d.,]+)\s*%\s+([\d.,]+)\s*€\s*$/);
    if (main) {
      flush();
      current = {
        pos: parseInt(main[1]),
        rawLabel: main[2].trim(),
        unitPrice: toCents(parseGermanNumber(main[3])),
        quantity: parseInt(main[4]),
        vatRate: parseGermanNumber(main[5]),
        totalPrice: toCents(parseGermanNumber(main[6])),
        rawSize: null,
        rawVariant: null
      };
      continue;
    }
    parseAttributeLine(line, current);
  }
  flush();
  return result;
}

function parseMewaInvoice(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim());
  const result = { ...parseInvoiceMeta(lines), items: [], format: 'mewa' };
  if (!result.supplierName) result.supplierName = 'MEWA AG';
  let inTable = false;
  let current = null;
  const flush = () => { if (current) result.items.push(current); current = null; };

  for (const line of lines) {
    if (!inTable) {
      if (/pos\.?\s+artikelnr\.?\s+bezeichnung/i.test(line) || /artikelnr\.?\s+bezeichnung\s+menge/i.test(line)) {
        inTable = true;
      }
      continue;
    }
    if (/^nettobetrag|^gesamtbetrag|^summe\s+netto|^mwst|^ust|^zahlungsziel/i.test(line)) {
      flush();
      break;
    }
    const main = line.match(/^(\d+)\s+(\d{4,})\s+(.+?)\s+(\d+)\s+([\d.,]+)\s*€\s+([\d.,]+)\s*€\s*$/);
    if (main) {
      flush();
      current = {
        pos: parseInt(main[1]),
        rawLabel: `${main[2]} ${main[3].trim()}`,
        supplierSku: main[2],
        unitPrice: toCents(parseGermanNumber(main[5])),
        quantity: parseInt(main[4]),
        totalPrice: toCents(parseGermanNumber(main[6])),
        rawSize: null,
        rawVariant: null
      };
      continue;
    }
    parseAttributeLine(line, current);
  }
  flush();
  return result;
}

function parseGenericInvoice(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim());
  const result = { ...parseInvoiceMeta(lines), items: [], format: 'generic' };
  let inTable = false;
  let current = null;
  let pos = 1;
  const flush = () => { if (current) result.items.push(current); current = null; };

  for (const line of lines) {
    if (!line) continue;
    if (!inTable) {
      if (/(artikel|bezeichnung).*(menge|anzahl)|(?:menge|anzahl).*(preis|einzelpreis)|\bpos\b.*\bpreis\b/i.test(line)) {
        inTable = true;
      }
      continue;
    }
    if (/^nettobetrag|^gesamtbetrag|^gesamtsumme|^zwischensumme|^summe|^mwst|^ust|^zahlungsziel|^versand/i.test(line)) {
      flush();
      break;
    }
    let main = line.match(/^(\d+)\s+(.+?)\s+([\d.,]+)\s*€\s+(\d+)\s+([\d.,]+)\s*€\s*$/);
    if (main) {
      flush();
      current = {
        pos: parseInt(main[1]),
        rawLabel: main[2].trim(),
        unitPrice: toCents(parseGermanNumber(main[3])),
        quantity: parseInt(main[4]),
        totalPrice: toCents(parseGermanNumber(main[5])),
        rawSize: null,
        rawVariant: null
      };
      continue;
    }
    main = line.match(/^(\d+)\s+(.+?)\s+(\d+)\s+([\d.,]+)\s*€\s+([\d.,]+)\s*€\s*$/);
    if (main) {
      flush();
      current = {
        pos: parseInt(main[1]),
        rawLabel: main[2].trim(),
        quantity: parseInt(main[3]),
        unitPrice: toCents(parseGermanNumber(main[4])),
        totalPrice: toCents(parseGermanNumber(main[5])),
        rawSize: null,
        rawVariant: null
      };
      continue;
    }
    main = line.match(/^(\d+)\s*[xX]\s+(.+?)\s+([\d.,]+)\s*€(?:\s+([\d.,]+)\s*€)?\s*$/);
    if (main) {
      flush();
      current = {
        pos: pos++,
        rawLabel: main[2].trim(),
        quantity: parseInt(main[1]),
        unitPrice: toCents(parseGermanNumber(main[3])),
        totalPrice: toCents(parseGermanNumber(main[4] || (parseGermanNumber(main[3]) * parseInt(main[1])))),
        rawSize: null,
        rawVariant: null
      };
      continue;
    }
    main = line.match(/^(.+?)\s+(\d+)\s*[xX]\s+([\d.,]+)\s*€(?:\s+([\d.,]+)\s*€)?\s*$/);
    if (main) {
      flush();
      current = {
        pos: pos++,
        rawLabel: main[1].trim(),
        quantity: parseInt(main[2]),
        unitPrice: toCents(parseGermanNumber(main[3])),
        totalPrice: toCents(parseGermanNumber(main[4] || (parseGermanNumber(main[3]) * parseInt(main[2])))),
        rawSize: null,
        rawVariant: null
      };
      continue;
    }
    parseAttributeLine(line, current);
  }
  flush();
  return result;
}

function parseInvoiceText(text) {
  const format = detectInvoiceFormat(text);
  if (format === 'mewa') return parseMewaInvoice(text);
  const bandy = parseBandyshirtInvoice(text);
  if (bandy.items.length > 0) return bandy;
  const mewa = parseMewaInvoice(text);
  if (mewa.items.length > 0) return mewa;
  const generic = parseGenericInvoice(text);
  if (generic.items.length > 0) return generic;
  return bandy;
}

function findExistingImport(invoiceNo) {
  if (!invoiceNo) return null;
  const norm = invoiceNo.trim().toLowerCase();
  return state.imports.find(i => (i.invoiceNo || '').trim().toLowerCase() === norm) || null;
}

/* SKU-Suche im Label (z. B. #E190, ABC-123) */
function extractSku(label) {
  if (!label) return null;
  const m = label.match(/(#[A-Z0-9]+|[A-Z]{2,}-?\d+|\b[A-Z]\d{3,}\b|\b\d{4,}\b)/);
  return m ? m[1] : null;
}

/* Match-Versuch: liefert {status, score, articleId, note} */
function matchLine(rawLine, supplierId) {
  const sku = extractSku(rawLine.rawLabel);
  const labelClean = (rawLine.rawLabel || '').replace(sku || '', '').trim();

  // Stufe 1: SKU + (Größe + Variante) exakt
  if (sku) {
    const aliases = state.aliases.filter(a =>
      a.supplierSku && a.supplierSku.toLowerCase() === sku.toLowerCase() &&
      (!supplierId || !a.supplierId || a.supplierId === supplierId)
    );
    for (const a of aliases) {
      const sizeOk = !rawLine.rawSize || !a.matchSize ||
        a.matchSize.toLowerCase() === rawLine.rawSize.toLowerCase();
      const variantOk = !rawLine.rawVariant || !a.matchVariant ||
        a.matchVariant.toLowerCase() === rawLine.rawVariant.toLowerCase();
      if (sizeOk && variantOk) {
        const article = state.articles.find(x => x.id === a.articleId);
        if (article && article.active !== false) {
          return { status: 'auto', score: 100, articleId: article.id, note: 'SKU-Treffer' };
        }
      }
    }
    // Stufe 2: SKU passt, aber Größe nicht im Stamm
    if (aliases.length > 0) {
      return {
        status: 'suggest', score: 80,
        articleId: aliases[0].articleId,
        note: 'SKU passt, Größe/Variante prüfen'
      };
    }
  }

  // Stufe 3: Fuzzy-Match auf internalName
  let best = null;
  const labelToCompare = labelClean || rawLine.rawLabel || '';
  for (const art of state.articles.filter(a => a.active !== false)) {
    const score = levenshteinRatio(art.internalName, labelToCompare);
    const sizeMatches = !rawLine.rawSize || !art.size ||
      art.size.toLowerCase() === rawLine.rawSize.toLowerCase();
    const variantMatches = !rawLine.rawVariant || !art.variant ||
      art.variant.toLowerCase() === rawLine.rawVariant.toLowerCase();
    const adjusted = score - (sizeMatches ? 0 : 15) - (variantMatches ? 0 : 10);
    if (!best || adjusted > best.adjusted) best = { article: art, score, adjusted, sizeMatches, variantMatches };
  }
  if (best && best.adjusted >= 80) {
    return {
      status: 'suggest', score: best.adjusted,
      articleId: best.article.id,
      note: `Fuzzy-Treffer (${best.adjusted}%)`
    };
  }

  return { status: 'needs_review', score: 0, articleId: null, note: 'Kein Treffer' };
}

let invoicePreview = null;

function summarizeImportLines(lines) {
  return {
    total: lines.length,
    auto: lines.filter(line => line.matchStatus === 'auto').length,
    suggest: lines.filter(line => line.matchStatus === 'suggest').length,
    manual: lines.filter(line => line.matchStatus === 'manual').length,
    need: lines.filter(line => line.matchStatus === 'needs_review' || !line.matchedArticleId).length,
    resolved: lines.filter(line => !!line.matchedArticleId).length
  };
}

function ensureParsedInvoiceIsImportable(parsed) {
  if (!parsed || !Array.isArray(parsed.items) || parsed.items.length === 0) {
    return 'Keine Positionen erkannt. Bitte Tabellenkopf oder Rechnungsaufbau prüfen.';
  }
  if (importBehaviorSettings().requireInvoiceNumber && !parsed.invoiceNo) {
    return 'Rechnungsnummer fehlt. In den Einstellungen kann die Pflicht abgeschaltet werden.';
  }
  if (parsed.invoiceNo) {
    const existing = findExistingImport(parsed.invoiceNo);
    if (existing) return `Rechnung ${parsed.invoiceNo} existiert bereits (${existing.status}).`;
  }
  return null;
}

function buildInvoicePreview(text) {
  const parsed = parseInvoiceText(text);
  const supplier = parsed.supplierName ? findSupplierByName(parsed.supplierName) : null;
  const lines = parsed.items.map(item => {
    const match = matchLine(item, supplier?.id || null);
    return {
      ...item,
      matchStatus: match.status,
      matchScore: match.score,
      matchedArticleId: match.articleId,
      note: match.note
    };
  });
  return {
    parsed,
    supplier,
    lines,
    summary: summarizeImportLines(lines),
    warning: ensureParsedInvoiceIsImportable(parsed)
  };
}

function createSupplierFromImport(imp) {
  if (!imp?.supplierName) return null;
  const existing = findSupplierByName(imp.supplierName);
  if (existing) {
    imp.supplierId = existing.id;
    return { supplier: existing, created: false };
  }
  const supplier = {
    id: nextId(),
    name: imp.supplierName,
    shortName: imp.supplierName.split(/\s+/)[0] || null,
    address: null,
    taxId: null,
    vatId: null,
    email: null,
    phone: null,
    website: null,
    notes: imp.invoiceNo ? `Automatisch aus Rechnung ${imp.invoiceNo}` : 'Automatisch aus Rechnung angelegt'
  };
  state.suppliers.push(supplier);
  imp.supplierId = supplier.id;
  audit('AUTO_CREATE_SUPPLIER_FROM_IMPORT', 'supplier', supplier.id, null, { importId: imp.id });
  return { supplier, created: true };
}

function createImportFromParsed(parsed, rawText) {
  const err = ensureParsedInvoiceIsImportable(parsed);
  if (err) throw new Error(err);
  const supplier = parsed.supplierName ? findSupplierByName(parsed.supplierName) : null;
  const imp = {
    id: nextId(),
    supplierId: supplier?.id || null,
    supplierName: parsed.supplierName,
    invoiceNo: parsed.invoiceNo,
    invoiceDate: parsed.invoiceDate,
    rawText,
    status: 'parsed',
    createdAt: todayISO()
  };
  state.imports.push(imp);
  audit('CREATE_IMPORT', 'import', imp.id, null, {
    supplierName: imp.supplierName,
    invoiceNo: imp.invoiceNo,
    invoiceDate: imp.invoiceDate
  });
  parsed.items.forEach(item => {
    const match = matchLine(item, imp.supplierId);
    state.importLines.push({
      id: nextId(),
      importId: imp.id,
      pos: item.pos,
      rawLabel: item.rawLabel,
      rawSize: item.rawSize,
      rawVariant: item.rawVariant,
      quantity: item.quantity,
      unitPrice: item.unitPrice,
      totalPrice: item.totalPrice,
      matchStatus: match.status,
      matchScore: match.score,
      matchedArticleId: match.articleId,
      note: match.note
    });
  });
  return imp;
}

function autoCreateArticleForImportLine(line, imp) {
  const cfg = appSettings();
  const rules = inventoryRulesSettings();
  if (rules.requireLocationForNewArticle && !cfg.defaultLocation) {
    return { article: null, error: 'Standard-Lagerort fehlt' };
  }
  if (rules.requireMinStockForNewArticle && !(Number(cfg.defaultMinStock) > 0)) {
    return { article: null, error: 'Standard-Mindestbestand fehlt' };
  }
  const article = { id: nextId(), ...buildImportArticleDraft(line, imp) };
  state.articles.push(article);
  line.matchedArticleId = article.id;
  line.matchStatus = 'manual';
  line.matchScore = 100;
  line.note = 'Automatisch neu angelegt';
  audit('AUTO_CREATE_ARTICLE_FROM_IMPORT', 'article', article.id, null, { importId: imp.id, importLineId: line.id });
  return { article, error: null };
}

async function applyAutoImportRules(importId) {
  const imp = state.imports.find(item => item.id === importId);
  if (!imp) return { autoBooked: false, supplierCreated: false, suggestionsApproved: 0, articlesCreated: 0, blocked: [], unresolved: 0 };
  const config = importBehaviorSettings();
  const lines = state.importLines.filter(line => line.importId === importId);
  let supplierCreated = false;
  let suggestionsApproved = 0;
  let articlesCreated = 0;
  const blocked = [];

  if (!imp.supplierId && imp.supplierName && config.autoCreateSupplier) {
    supplierCreated = !!createSupplierFromImport(imp)?.created;
  }
  for (const line of lines) {
    if (line.matchStatus === 'suggest' && config.autoApproveSuggestions && line.matchScore >= config.autoApproveScore) {
      line.matchStatus = 'manual';
      line.note = `Automatisch bestaetigt (${line.matchScore}%)`;
      suggestionsApproved++;
    }
  }
  for (const line of lines.filter(item => !item.matchedArticleId)) {
    if (!config.autoCreateArticle) break;
    const result = autoCreateArticleForImportLine(line, imp);
    if (result.article) articlesCreated++;
    else blocked.push(`Pos ${line.pos || '—'}: ${result.error}`);
  }

  const unresolved = lines.filter(line => !line.matchedArticleId).length;
  const openSuggestions = lines.filter(line => line.matchStatus === 'suggest').length;
  let autoBooked = false;
  if (config.autoBookImportIfComplete && unresolved === 0 && openSuggestions === 0) {
    autoBooked = await confirmImport(importId, { skipConfirm: true, successToast: false });
  }
  return { autoBooked, supplierCreated, suggestionsApproved, articlesCreated, blocked, unresolved };
}

  admin: 'Administrator',
  office: 'Büro',
  warehouse: 'Lager',

};

function movementStockDelta(m) {
  if (m.type === 'defekt') return 0;
  if (['eingang', 'ausgabe', 'rueckgabe', 'korrektur'].includes(m.type)) return m.quantity;
  return 0;
}

function validateImportedState(obj) {
  if (!obj || typeof obj !== 'object') return 'JSON enthält kein Objekt.';
  const requiredArrays = STATE_ARRAY_KEYS;
  for (const key of requiredArrays) {
    if (!Array.isArray(obj[key])) return `Pflichtbereich "${key}" fehlt oder ist keine Liste.`;
  }
  if (obj.auditLog !== undefined && !Array.isArray(obj.auditLog)) return 'auditLog muss eine Liste sein.';
  if (!obj.meta || typeof obj.meta !== 'object') return 'meta fehlt.';
  if (!Number.isInteger(obj.meta.nextId) || obj.meta.nextId < 1) return 'meta.nextId ungültig.';
  const seenIds = new Set();
  for (const key of requiredArrays) {
    for (const row of obj[key]) {
      if (!row || typeof row !== 'object') return `Ungültiger Eintrag in "${key}".`;
      if (!Number.isInteger(row.id) || row.id < 1) return `Eintrag in "${key}" hat keine gültige ID.`;
      const globalKey = key + ':' + row.id;
      if (seenIds.has(globalKey)) return `Doppelte ID ${row.id} in "${key}".`;
      seenIds.add(globalKey);
    }
  }
  const articleIds = new Set(obj.articles.map(a => a.id));
  const employeeIds = new Set(obj.employees.map(e => e.id));
  const importIds = new Set(obj.imports.map(i => i.id));
  for (const m of obj.movements) {
    if (!articleIds.has(m.articleId)) return `Bewegung ${m.id} verweist auf unbekannten Artikel.`;
    if (m.employeeId && !employeeIds.has(m.employeeId)) return `Bewegung ${m.id} verweist auf unbekannten Mitarbeiter.`;
  }
  for (const l of obj.importLines) {
    if (!importIds.has(l.importId)) return `Import-Zeile ${l.id} verweist auf unbekannten Import.`;
  }
  for (const art of obj.articles) {
    const fromMovements = obj.movements
      .filter(m => m.articleId === art.id)
      .reduce((sum, m) => sum + movementStockDelta(m), 0);
    const storedStock = articleStockValue(art);
    if (fromMovements !== storedStock) {
      const name = art.internalName || `ID ${art.id}`;
      return `Bestand „${name}" (${storedStock}) weicht von Bewegungen ab (${fromMovements}).`;
    }
  }
  return null;
}

function csvEscape(v) {
  const s = String(v ?? '');
  return /[;"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

function downloadText(filename, text, type='text/plain') {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function handleRoute() {

  const [route, ...params] = hash.split('/');

function renderDashboard() {
  const v = $('#view');
  const lowStock = state.articles.filter(a => a.active !== false && a.stock <= a.minStock && a.minStock > 0);
  const pendingImports = state.imports.filter(imp => imp.status !== 'confirmed' && imp.status !== 'cancelled');

  // Auffälliger Verbrauch: Mitarbeiter mit > 3 Ausgaben innerhalb von 30 Tagen für gleichen Artikel
  const since = new Date(); since.setDate(since.getDate() - 30);
  const sinceISO = since.toISOString().substr(0,10);
  const heatmap = {};
  state.movements.filter(m => m.type === 'ausgabe' && m.occurredAt >= sinceISO && m.employeeId).forEach(m => {
    const k = m.employeeId + '_' + m.articleId;
    heatmap[k] = (heatmap[k] || 0) + 1;
  });
  const anomalies = Object.entries(heatmap).filter(([_,c]) => c >= 3).map(([k,c]) => {
    const [eid, aid] = k.split('_').map(Number);
    return { employee: state.employees.find(e => e.id === eid), article: state.articles.find(a => a.id === aid), count: c };
  }).filter(x => x.employee && x.article);

  const lastMovements = [...state.movements].sort((a,b) => (b.occurredAt+b.id).localeCompare(a.occurredAt+a.id)).slice(0,10);

  const activeArticles = state.articles.filter(a => a.active !== false).length;
  const kpiCard = (icon, colorClass, label, val, hint) => `
    <div class="kpi">
      <div class="kpi-icon ${colorClass}">${icon}</div>
      <div class="kpi-body">
        <div class="kpi-label">${label}</div>
        <div class="kpi-val ${colorClass}">${val}</div>
        <div class="kpi-hint">${hint}</div>
      </div>
    </div>`;

  v.innerHTML = `
    <div class="kpi-grid">
      ${kpiCard('🔴', lowStock.length ? 'red' : 'green',
        'Mindestbestand unterschritten', lowStock.length,
        lowStock.length ? lowStock.slice(0,2).map(a=>escapeHtml(a.internalName)).join(', ')+(lowStock.length>2?' …':'') : 'Alles im grünen Bereich')}
      ${kpiCard('📥', pendingImports.length ? 'yellow' : 'green',
        'Importe zu prüfen', pendingImports.length,
        pendingImports.length ? 'Bitte Positionen prüfen & buchen' : 'Keine offenen Importe')}
      ${kpiCard('⚠️', anomalies.length ? 'yellow' : 'green',
        'Auffälliger Verbrauch', anomalies.length,
        'Letzte 30 Tage · ≥ 3 Ausgaben/Artikel')}
      ${kpiCard('📦', 'blue',
        'Aktive Artikel', activeArticles,
        state.employees.filter(e=>e.active!==false).length + ' Mitarbeiter · ' + state.suppliers.length + ' Lieferanten')}
    </div>

    <div class="row">
      <div class="card" style="flex:1; min-width:340px;">
        <h2>⚠ Mindestbestand-Warnung</h2>
        ${lowStock.length === 0
          ? '<div class="empty"><div class="empty-ico">✅</div><div>Alles im grünen Bereich</div></div>'
          : `<table>
            <thead><tr><th>Artikel</th><th>Größe</th><th class="num">Bestand</th><th class="num">Min</th></tr></thead>
            <tbody>
              ${lowStock.slice(0,8).map(a => `
                <tr class="row-danger">
                  <td><a href="#article/${a.id}">${escapeHtml(a.internalName)}</a></td>
                  <td>${escapeHtml(a.size || '—')}</td>
                  <td class="num"><span class="pill red">${a.stock}</span></td>
                  <td class="num">${a.minStock}</td>
                </tr>
              `).join('')}
            </tbody>

          </table>`}
      </div>
      <div class="card" style="flex:1; min-width:340px;">
        <h2>📥 Offene Importe</h2>
        ${pendingImports.length === 0
          ? '<div class="empty"><div class="empty-ico">🎉</div><div>Keine offenen Importe</div></div>'
          : `<table>
            <thead><tr><th>Rechnungs-Nr.</th><th>Datum</th><th>Lieferant</th><th></th></tr></thead>
            <tbody>
              ${pendingImports.slice(0,8).map(imp => `

      <h2>🔄 Letzte Bewegungen</h2>
      ${lastMovements.length === 0
        ? '<div class="empty"><div class="empty-ico">📋</div><div>Noch keine Bewegungen erfasst</div></div>'
        : `<table>
          <thead><tr><th>Datum</th><th>Typ</th><th>Artikel</th><th>Mitarbeiter</th><th class="num">Menge</th></tr></thead>
          <tbody>
            ${lastMovements.map(m => {

function analyzeInvoiceText() {
  const text = $('#invoiceText').value;
  if (!text || text.trim().length < 20) { toast('Bitte Rechnungstext einfügen.', 'error'); return; }
  invoicePreview = buildInvoicePreview(text);
  renderInvoicePreview(invoicePreview);
  if (invoicePreview.lines.length === 0) {
    toast('Keine Positionen erkannt. Bitte Rechnungsaufbau pruefen.', 'error');
    return;
  }
  if (invoicePreview.warning) {
    toast(invoicePreview.warning, 'error');
    return;
  }
  toast(`Analyse fertig: ${invoicePreview.summary.total} Position(en) erkannt.`, 'success');
}

async function parseAndCreateImport(mode='review') {
  const text = $('#invoiceText').value;
  if (!text || text.trim().length < 20) { toast('Bitte Rechnungstext einfügen.', 'error'); return; }
  const preview = buildInvoicePreview(text);
  invoicePreview = preview;
  renderInvoicePreview(preview);
  if (preview.warning) {
    toast(preview.warning, 'error');
    if (preview.parsed.invoiceNo) {
      const existing = findExistingImport(preview.parsed.invoiceNo);
      if (existing) navigate('review/' + existing.id);
    }
    return;
  }

  let imp;
  try {
    imp = createImportFromParsed(preview.parsed, text);
  } catch (err) {
    toast(err.message || 'Import konnte nicht angelegt werden.', 'error');
    return;
  }

  let autoResult = null;
  if (mode === 'smart') {
    autoResult = await applyAutoImportRules(imp.id);
  }
  persist();
  const fmt = preview.parsed.format ? ` (${preview.parsed.format})` : '';
  if (mode === 'smart' && autoResult) {
    const parts = [];
    if (autoResult.supplierCreated) parts.push('Lieferant angelegt');
    if (autoResult.articlesCreated) parts.push(`${autoResult.articlesCreated} Artikel angelegt`);
    if (autoResult.suggestionsApproved) parts.push(`${autoResult.suggestionsApproved} Vorschlaege bestaetigt`);
    if (autoResult.autoBooked) parts.push('Import direkt gebucht');
    if (autoResult.blocked.length) parts.push(`${autoResult.blocked.length} Regel-Blocker`);
    toast(parts.length ? parts.join(' · ') : `Import angelegt${fmt}.`, autoResult.blocked.length ? 'error' : 'success');
    navigate(autoResult.autoBooked ? 'imports' : 'review/' + imp.id);
    return;
  }
  toast(`Import angelegt mit ${preview.parsed.items.length} Positionen${fmt}.`, 'success');
  navigate('review/' + imp.id);
}

/* ---------- Import: Prüfung & Bestätigung ---------- */
function renderImportReview(idStr) {
  const id = parseInt(idStr);
  const imp = state.imports.find(i => i.id === id);
  if (!imp) { $('#view').innerHTML = '<div class="empty">Import nicht gefunden.</div>'; return; }
  const lines = state.importLines.filter(l => l.importId === id).sort((a,b) => a.pos - b.pos);
  const summary = summarizeImportLines(lines);
  const v = $('#view');

  const supplier = state.suppliers.find(s => s.id === imp.supplierId);
  const supplierLabel = supplier
    ? escapeHtml(supplier.name)

function adoptSupplier(importId) {
  const imp = state.imports.find(i => i.id === importId);
  if (!imp || !imp.supplierName) return;
  const result = createSupplierFromImport(imp);
  if (!result?.supplier) return;
  persist();
  toast(result.created ? 'Lieferant angelegt.' : 'Lieferant zugeordnet.', 'success');
  navigate('review/' + importId);
}

async function autoCompleteImport(importId) {
  const result = await applyAutoImportRules(importId);
  persist();
  const parts = [];
  if (result.supplierCreated) parts.push('Lieferant angelegt');
  if (result.articlesCreated) parts.push(`${result.articlesCreated} Artikel angelegt`);
  if (result.suggestionsApproved) parts.push(`${result.suggestionsApproved} Vorschlaege bestaetigt`);
  if (result.autoBooked) parts.push('Import direkt gebucht');
  if (result.blocked.length) parts.push(`${result.blocked.length} Blocker`);
  toast(parts.length ? parts.join(' · ') : 'Keine automatische Aenderung moeglich.', result.blocked.length ? 'error' : 'success');
  navigate(result.autoBooked ? 'imports' : 'review/' + importId);
}

function confirmSuggestLine(lineId) {
  const line = state.importLines.find(l => l.id === lineId);
  if (!line || line.matchStatus !== 'suggest') return;
  line.matchStatus = 'manual';
  line.note = ((line.note || '') + ' · Vorschlag bestätigt').trim();
  persist();
  toast('Vorschlag bestätigt.', 'success');
  navigate('review/' + line.importId);
}

async function assignArticleToLine(lineId) {
  const line = state.importLines.find(l => l.id === lineId);
  if (!line) return;
  const articles = state.articles.filter(a => a.active !== false).sort((a,b) => a.internalName.localeCompare(b.internalName));
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="field">
      <label>Suche Artikel</label>
      <input type="search" id="search" placeholder="Tippen zum Filtern …">
    </div>
    <div id="list" style="max-height:340px; overflow-y:auto; border:1px solid #e5e7eb; border-radius:6px;"></div>
  `;
  const refresh = (q='') => {
    const filtered = articles.filter(a => (a.internalName + ' ' + (a.size||'') + ' ' + (a.variant||'')).toLowerCase().includes(q.toLowerCase()));
    div.querySelector('#list').innerHTML = filtered.map(a => `
      <div style="padding:8px 12px; cursor:pointer; border-bottom:1px solid #f3f4f6; display:flex; justify-content:space-between;" onclick="window.__pickArticle(${a.id})">
        <span><strong>${escapeHtml(a.internalName)}</strong> <span style="color:#6b7280;">${escapeHtml(a.size||'')} ${escapeHtml(a.variant||'')}</span></span>
        <span style="color:#6b7280; font-size:12px;">Bestand: ${a.stock}</span>
      </div>
    `).join('') || '<div class="empty">Keine Artikel.</div>';
  };
  refresh();
  div.querySelector('#search').oninput = (e) => refresh(e.target.value);
  const pick = new Promise(resolve => { window.__pickArticle = (id) => resolve(id); });
  const m = modal({ title: 'Artikel zuordnen', body: div, footer: [{ label:'Abbrechen', kind:'sec', value:null }] });
  const result = await Promise.race([pick, m]);
  delete window.__pickArticle;
  document.querySelectorAll('.modal-bg').forEach(x => x.remove());
  if (!result) return;
  line.matchedArticleId = result;
  line.matchStatus = 'manual';
  line.matchScore = 100;
  line.note = 'Manuell zugeordnet';
  persist();
  toast('Zuordnung gespeichert.', 'success');
  navigate('review/' + line.importId);
}

  if (!line) return;

  const draft = buildImportArticleDraft(line, imp);
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="field"><label>Interne Bezeichnung</label><input id="iname" value="${escapeHtml(draft.internalName)}"></div>
    <div class="grid-2">
      <div class="field"><label>Kategorie</label><select id="icat">${categoryOptions(draft.category)}</select></div>
      <div class="field"><label>Einheit</label><select id="iunit">${unitOptions(draft.unit)}</select></div>
      <div class="field"><label>Artikelnummer / SKU</label><input id="iartno" value="${escapeHtml(draft.articleNumber || '')}"></div>
      <div class="field"><label>Lieferant</label><input id="isupplier" value="${escapeHtml(draft.supplier || '')}"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Größe</label><input id="isize" value="${escapeHtml(draft.size||'')}"></div>
      <div class="field"><label>Variante</label><input id="ivar" value="${escapeHtml(draft.variant||'')}"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Mindestbestand</label><input id="imin" type="number" value="${draft.minStock || 0}" min="0"></div>
      <div class="field"><label>Lagerort</label><input id="iloc" value="${escapeHtml(draft.location || '')}"></div>
      <div class="field"><label>Letzter EK (€)</label><input id="iprice" value="${draft.lastPurchasePrice ? (draft.lastPurchasePrice / 100).toFixed(2).replace('.', ',') : ''}"></div>

  `;

    title: 'Neuen Artikel anlegen',
    body: div,
    footer: [
      { label: 'Abbrechen', kind: 'sec', value: false },
      { label: 'Anlegen &amp; zuordnen', value: true }
    ]
  }).then(ok => {
    if (!ok) return;
    const rules = inventoryRulesSettings();
    const cat = div.querySelector('#icat').value;
    const location = div.querySelector('#iloc').value.trim() || null;
    const minStock = parseInt(div.querySelector('#imin').value) || 0;
    if (rules.requireLocationForNewArticle && !location) { toast('Lagerort ist laut Einstellungen Pflicht.', 'error'); return; }
    if (rules.requireMinStockForNewArticle && minStock <= 0) { toast('Mindestbestand ist laut Einstellungen Pflicht.', 'error'); return; }
    const article = {
      id: nextId(),
      internalName: div.querySelector('#iname').value.trim() || line.rawLabel,

      ean: null,
      supplier: div.querySelector('#isupplier').value.trim() || null,
      notes: div.querySelector('#inotes').value.trim() || null,

      stock: 0,
      minStock,
      location,
      lastPurchasePrice: parseGermanNumber(div.querySelector('#iprice').value) != null ? toCents(parseGermanNumber(div.querySelector('#iprice').value)) : draft.lastPurchasePrice,
      personalAssignment: !!catInfo(cat).personal,
      active: true
    };
    state.articles.push(article);
    line.matchedArticleId = article.id;
    line.matchStatus = 'manual';
    line.matchScore = 100;
    line.note = 'Neu angelegt';
    persist();
    toast('Artikel angelegt und zugeordnet.', 'success');
    navigate('review/' + line.importId);
  });
}

async function confirmImport(importId, options={}) {
  if (!requirePermission('import', 'Nur Office & Admin dürfen Importe bestätigen.')) return;
  const { skipConfirm = false, successToast = true } = options;
  const imp = state.imports.find(i => i.id === importId);
  if (!imp) return false;
  if (imp.status === 'confirmed') {
    toast('Import wurde bereits gebucht.', 'error');
    return false;
  }
  if (imp.status === 'cancelled') {
    toast('Import wurde verworfen.', 'error');
    return false;
  }
  const lines = state.importLines.filter(l => l.importId === importId);
  const unresolved = lines.filter(l => !l.matchedArticleId);
  if (unresolved.length > 0) {
    toast(`${unresolved.length} Position(en) noch nicht zugeordnet.`, 'error');
    return false;
  }
  const unconfirmedSuggest = lines.filter(l => l.matchStatus === 'suggest');
  if (unconfirmedSuggest.length > 0) {
    toast(`${unconfirmedSuggest.length} Vorschlag/Vorschläge müssen erst bestätigt werden.`, 'error');
    return false;
  }
  if (!skipConfirm && !await confirmDialog(`${lines.length} Position(en) buchen und Bestände erhöhen?`)) return false;

  let aliasesLearned = 0;
  for (const line of lines) {
    const art = state.articles.find(a => a.id === line.matchedArticleId);
    if (!art) continue;
    art.stock += line.quantity;
    if (line.unitPrice != null) art.lastPurchasePrice = line.unitPrice;
    state.movements.push({
      id: nextId(),
      articleId: art.id,
      type: 'eingang',
      quantity: line.quantity,
      employeeId: null,
      importLineId: line.id,
      unitPrice: line.unitPrice,
      note: `Import ${imp.invoiceNo || ''}`,
      occurredAt: imp.invoiceDate || todayISO()
    });
    // Alias lernen: SKU oder rohes Label
    const sku = extractSku(line.rawLabel);
    const exists = state.aliases.find(a =>
      a.articleId === art.id &&
      (a.supplierId || null) === (imp.supplierId || null) &&
      (a.supplierSku || '') === (sku || '') &&
      (a.matchSize || '') === (line.rawSize || '') &&
      (a.matchVariant || '') === (line.rawVariant || '')
    );
    if (!exists) {
      state.aliases.push({
        id: nextId(),
        articleId: art.id,
        supplierId: imp.supplierId || null,
        supplierSku: sku,
        supplierLabel: line.rawLabel,
        matchSize: line.rawSize,
        matchVariant: line.rawVariant
      });
      aliasesLearned++;
    }
  }
  imp.status = 'confirmed';
  imp.confirmedAt = todayISO();
  audit('IMPORT_CONFIRMED', 'import', importId, {status:'parsed'}, {status:'confirmed', lines: lines.length});
  persist();
  if (successToast) toast(`${lines.length} Bewegungen gebucht. ${aliasesLearned} neue Aliase gelernt.`, 'success');
  if (!skipConfirm) navigate('imports');
  return true;
}

async function cancelImport(importId) {
  if (!requirePermission('import', 'Nur Office & Admin dürfen Importe verwerfen.')) return;
  if (!await confirmDialog('Diesen Import wirklich verwerfen?')) return;
  const imp = state.imports.find(i => i.id === importId);
  if (imp) { audit('IMPORT_CANCELLED', 'import', importId, {status: imp.status}, {status:'cancelled'}); imp.status = 'cancelled'; }
  persist();
  toast('Import verworfen.');
  navigate('imports');
}

function bookManualReceipt() {
  if (!requirePermission('stock', 'Nur Lager & Admin dürfen Wareneingänge buchen.')) return;
  const aid = parseInt($('#rArt').value);
  const qty = parseInt($('#rQty').value);
  const price = parseGermanNumber($('#rPrice').value);
  const date = $('#rDate').value || todayISO();
  const note = $('#rNote').value.trim();
  if (!aid || !qty || qty <= 0) { toast('Artikel und Menge angeben.', 'error'); return; }
  const art = state.articles.find(a => a.id === aid);
  if (!art) return;
  art.stock += qty;
  if (price != null) art.lastPurchasePrice = toCents(price);
  state.movements.push({
    id: nextId(),
    articleId: aid,
    type: 'eingang',
    quantity: qty,
    employeeId: null,
    importLineId: null,
    unitPrice: price != null ? toCents(price) : null,
    note: note || 'Manueller Wareneingang',
    occurredAt: date
  });
  audit('MANUAL_RECEIPT', 'article', aid, {stock: art.stock - qty}, {stock: art.stock, qty, date});
  persist();
  toast('Wareneingang gebucht.', 'success');
  navigate('inventory');
}

async function bookCorrection() {
  if (!requirePermission('stock', 'Nur Lager & Admin dürfen Korrekturen buchen.')) return;
  const rules = inventoryRulesSettings();
  const aid = parseInt($('#kArt').value);
  const delta = parseInt($('#kDelta').value, 10);
  const date = $('#kDate').value || todayISO();
  const note = $('#kNote').value.trim();
  if (!aid || !Number.isFinite(delta) || delta === 0) { toast('Artikel und Korrekturmenge (≠ 0) angeben.', 'error'); return; }
  if (!note) { toast('Bitte Begründung angeben.', 'error'); return; }
  const art = state.articles.find(a => a.id === aid);
  if (!art) return;
  if (delta < 0 && art.stock + delta < 0) {
    if (rules.preventNegativeStock) { toast(`Negative Bestaende sind gesperrt (waere ${art.stock + delta}).`, 'error'); return; }
    if (!await confirmDialog(`Bestand würde negativ (${art.stock + delta}). Trotzdem buchen?`)) return;
  }
  const before = art.stock;
  art.stock += delta;
  state.movements.push({
    id: nextId(),
    articleId: aid,
    type: 'korrektur',
    quantity: delta,
    employeeId: null,
    importLineId: null,
    unitPrice: art.lastPurchasePrice,
    note: note,
    occurredAt: date
  });
  audit('STOCK_CORRECTION', 'article', aid, { stock: before }, { stock: art.stock, delta, note });
  persist();
  toast('Korrektur gebucht.', 'success');
  navigate('inventory');
}

  const date = $('#iDate').value || todayISO();
  const note = $('#iNote').value.trim();
  if (!eid || !aid || !qty || qty <= 0) { toast('Bitte alle Pflichtfelder ausfüllen.', 'error'); return; }
  const art = state.articles.find(a => a.id === aid);
  if (!art) return;
  if (qty > art.stock) {
    if (rules.preventNegativeStock) { toast(`Bestand reicht nicht aus (vorhanden: ${art.stock}).`, 'error'); return; }
    if (!await confirmDialog(`Bestand reicht nicht (vorhanden: ${art.stock}). Trotzdem buchen?`)) return;
  }
  art.stock -= qty;
  const mov = {
    id: nextId(),
    articleId: aid,
    type: 'ausgabe',
    quantity: -qty,
    employeeId: eid,
    importLineId: null,
    unitPrice: art.lastPurchasePrice,
    note: note || null,
    occurredAt: date
  };
  state.movements.push(mov);
  if (art.personalAssignment) {
    state.assignments.push({
      id: nextId(),
      employeeId: eid,
      articleId: aid,
      quantity: qty,
      issuedAt: date,
      returnedAt: null,
      condition: null,
      replacementReason: null,
      issueMovementId: mov.id,
      returnMovementId: null
    });
  }
  audit('ISSUE', 'article', aid, {stock: art.stock + qty}, {stock: art.stock, qty, employeeId: eid});
  persist();
  toast('Ausgabe gebucht.', 'success');
  navigate('history');
}

    ]

  const date = div.querySelector('#rd').value || todayISO();

  const art = state.articles.find(x => x.id === a.articleId);
  const isDefect = cond === 'defekt';
  const mov = {
    id: nextId(),

    note: `Rückgabe (${cond})${reason ? ' · ' + reason : ''}`,

  };
  state.movements.push(mov);
  if (art && !isDefect) art.stock += a.quantity; // bei Defekt geht Bestand verloren
  a.returnedAt = date;
  a.condition = cond;
  a.replacementReason = reason;
  a.returnMovementId = mov.id;
  persist();
  toast('Rückgabe gebucht.', 'success');

  if (!requirePermission('write', 'Nur Office & Admin dürfen Artikel bearbeiten.')) return;
  const cfg = appSettings();
  const rules = inventoryRulesSettings();
  const art = id ? state.articles.find(a => a.id === id) : {
    internalName: preset?.internalName || '',
    articleNumber: preset?.articleNumber || '',
    ean: preset?.ean || '',
    supplier: preset?.supplier || '',
    notes: preset?.notes || '',
    category: preset?.category || cfg.defaultCategory,
    size: preset?.size || '',
    variant: preset?.variant || '',
    unit: preset?.unit || cfg.defaultUnit,
    stock: preset?.stock ?? 0,
    minStock: preset?.minStock ?? cfg.defaultMinStock,
    location: preset?.location || cfg.defaultLocation || '',
    lastPurchasePrice: preset?.lastPurchasePrice ?? null,
    personalAssignment: preset?.personalAssignment ?? !!catInfo(cfg.defaultCategory).personal,

  };
  if (!art) return;
  const div = document.createElement('div');
  div.innerHTML = `

      <div class="field"><label>Kategorie</label><select id="icat">${categoryOptions(art.category)}</select></div>
      <div class="field"><label>Einheit</label><select id="iunit">${unitOptions(art.unit)}</select></div>
      <div class="field"><label>Größe</label><input id="isize" value="${escapeHtml(art.size||'')}"></div>
      <div class="field"><label>Variante / Farbe</label><input id="ivar" value="${escapeHtml(art.variant||'')}"></div>
      <div class="field"><label>Lagerort</label><input id="iloc" value="${escapeHtml(art.location||'')}"></div>
      <div class="field"><label>Mindestbestand</label><input id="imin" type="number" min="0" value="${art.minStock||0}"></div>
      ${id ? '' : `<div class="field"><label>Anfangsbestand</label><input id="istart" type="number" min="0" value="0"></div>`}
      <div class="field"><label>Letzter EK (€)</label><input id="iprice" value="${art.lastPurchasePrice ? (art.lastPurchasePrice/100).toFixed(2).replace('.', ',') : ''}"></div>
    </div>
    <div class="field">
      <label>Beschreibung / Notizen</label>
      <textarea id="inotes" rows="3" style="width:100%; resize:vertical;">${escapeHtml(art.notes||'')}</textarea>
    </div>
    <div class="field" style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="ipers" ${art.personalAssignment?'checked':''} style="width:auto;">
      <label for="ipers" style="margin:0;">Personenbezogene Zuordnung (Arbeitskleidung etc.)</label>
    </div>
  `;
  modal({
    title: id ? 'Artikel bearbeiten' : 'Neuer Artikel',
    body: div,
    footer: id ? [
      { label: 'Löschen', kind: 'danger', value: 'del' },
      { label: 'Abbrechen', kind:'sec', value: false },
      { label: 'Speichern', value: true }
    ] : [
      { label: 'Abbrechen', kind:'sec', value: false },
      { label: 'Anlegen', value: true }
    ]
  }).then(async (res) => {
    if (!res) return;
    if (res === 'del') {
      if (!await confirmDialog('Artikel wirklich deaktivieren?')) return;
      art.active = false; persist(); toast('Deaktiviert.'); navigate('articles'); return;
    }
    const data = {
      internalName: div.querySelector('#iname').value.trim(),
      articleNumber: div.querySelector('#iartno').value.trim() || null,
      ean: div.querySelector('#iean').value.trim() || null,
      supplier: div.querySelector('#isupplier').value.trim() || null,
      notes: div.querySelector('#inotes').value.trim() || null,
      category: div.querySelector('#icat').value,
      unit: div.querySelector('#iunit').value,
      size: div.querySelector('#isize').value.trim() || null,
      variant: div.querySelector('#ivar').value.trim() || null,
      location: div.querySelector('#iloc').value.trim() || null,
      minStock: parseInt(div.querySelector('#imin').value) || 0,
      lastPurchasePrice: parseGermanNumber(div.querySelector('#iprice').value) != null ? toCents(parseGermanNumber(div.querySelector('#iprice').value)) : null,
      personalAssignment: div.querySelector('#ipers').checked,
      active: true
    };
    if (!data.internalName) { toast('Bezeichnung ist Pflicht.', 'error'); return; }
    if (rules.requireLocationForNewArticle && !data.location) { toast('Lagerort ist laut Einstellungen Pflicht.', 'error'); return; }
    if (rules.requireMinStockForNewArticle && data.minStock <= 0) { toast('Mindestbestand ist laut Einstellungen Pflicht.', 'error'); return; }
    if (id) Object.assign(art, data);
    else {
      const start = parseInt(div.querySelector('#istart').value) || 0;
      const newArt = { id: nextId(), ...data, stock: start };
      state.articles.push(newArt);
      if (start > 0) {
        state.movements.push({
          id: nextId(), articleId: newArt.id, type: 'eingang',
          quantity: start, employeeId: null, importLineId: null,
          unitPrice: data.lastPurchasePrice, note: 'Anfangsbestand',
          occurredAt: todayISO()
        });
      }
    }
    persist();
    toast('Gespeichert.', 'success');
    navigate('articles');
  });
}

function saveSettings() {
  const isAdmin = can('admin');
  if (isAdmin) {
    state.meta.settings = {
      companyName: $('#setCompany').value.trim(),
      defaultLocation: $('#setLocation').value.trim(),
      brandTitle: $('#setBrandTitle').value.trim() || 'Lagerverwaltung',
      brandSubtitle: $('#setBrandSub').value.trim(),
      defaultCategory: $('#setCat').value,
      defaultUnit: $('#setUnit').value,
      defaultMinStock: parseInt($('#setMin').value) || 0,
      importBehavior: {
        autoCreateSupplier: $('#setAutoSupplier').checked,
        autoCreateArticle: $('#setAutoArticle').checked,
        autoApproveSuggestions: $('#setAutoApprove').checked,
        autoApproveScore: Math.min(100, Math.max(50, parseInt($('#setAutoApproveScore').value) || 92)),
        autoBookImportIfComplete: $('#setAutoBook').checked,
        requireInvoiceNumber: $('#setRequireInvoiceNo').checked,
        copySkuToArticleNumber: $('#setCopySku').checked,
        copySupplierToArticle: $('#setCopySupplier').checked,
        copyInvoiceToNotes: $('#setCopyInvoiceNotes').checked
      },
      inventoryRules: {
        preventNegativeStock: $('#setPreventNegative').checked,
        requireLocationForNewArticle: $('#setRequireLocationArticle').checked,
        requireMinStockForNewArticle: $('#setRequireMinArticle').checked
      }
    };
    audit('UPDATE_SETTINGS', 'system', null, null, state.meta.settings);
  }
  state.meta.currentUser = {
    ...currentUser(),
    name: $('#setUserName').value.trim() || currentUser().name,
    role: $('#setUserRole').value || currentUser().role
  };
  persist();
  toast('Gespeichert.', 'success');

function addCustomCategory() {
  if (!requirePermission('admin')) return;
  const label = $('#newCatLabel').value.trim();
  if (!label) { toast('Kategoriename angeben.', 'error'); return; }
  const id = slugId(label);
  if (getCategories().some(c => c.id === id)) { toast('Kategorie existiert bereits.', 'error'); return; }
  state.meta.customCategories.push({
    id,
    label,
    icon: $('#newCatIcon').value.trim() || '📦',
    color: '#64748b',
    personal: $('#newCatPersonal').checked
  });
  persist();
  toast('Kategorie hinzugefügt.', 'success');
  navigate('settings');
}

async function removeCustomCategory(id) {
  if (!requirePermission('admin')) return;
  const inUse = state.articles.some(a => a.category === id && a.active !== false);
  if (inUse && !await confirmDialog('Kategorie wird noch von Artikeln genutzt. Trotzdem entfernen?')) return;
  state.meta.customCategories = (state.meta.customCategories || []).filter(c => c.id !== id);
  persist();
  toast('Kategorie entfernt.');
  navigate('settings');
}

function addCustomUnit() {
  if (!requirePermission('admin')) return;
  const unit = $('#newUnit').value.trim();
  if (!unit) { toast('Einheit angeben.', 'error'); return; }
  if (getUnits().includes(unit)) { toast('Einheit existiert bereits.', 'error'); return; }
  state.meta.customUnits.push(unit);
  persist();
  toast('Einheit hinzugefügt.', 'success');
  navigate('settings');
}

/* ---------- Artikel: Duplizieren & Varianten ---------- */
function duplicateArticle(id) {
  if (!requirePermission('write', 'Nur Office & Admin dürfen Artikel duplizieren.')) return;
  const src = state.articles.find(a => a.id === id);
  if (!src) return;
  editArticle(null, {
    internalName: src.internalName,
    articleNumber: src.articleNumber || '',
    ean: src.ean || '',
    supplier: src.supplier || '',
    notes: src.notes || '',
    category: src.category,
    size: src.size || '',
    variant: src.variant || '',
    unit: src.unit,
    stock: 0,
    minStock: src.minStock,
    location: src.location || '',
    lastPurchasePrice: src.lastPurchasePrice,
    personalAssignment: src.personalAssignment
  });
}

function createArticleVariants() {
  if (!requirePermission('write', 'Nur Office & Admin dürfen Artikel anlegen.')) return;
  const cfg = appSettings();
  const div = document.createElement('div');
  div.innerHTML = `
    <p class="help">Legt mehrere Artikel mit gleicher Bezeichnung und unterschiedlichen Größen an — ideal für T-Shirts, Schuhe etc.</p>
    <div class="field"><label>Bezeichnung *</label><input id="vName" placeholder="z. B. T-Shirt #E190"></div>
    <div class="grid-2">
      <div class="field"><label>Kategorie</label><select id="vCat">${categoryOptions(cfg.defaultCategory)}</select></div>
      <div class="field"><label>Einheit</label><select id="vUnit">${unitOptions(cfg.defaultUnit)}</select></div>
      <div class="field"><label>Variante / Farbe</label><input id="vVar" placeholder="z. B. Schwarz"></div>
      <div class="field"><label>Mindestbestand je Größe</label><input id="vMin" type="number" min="0" value="${cfg.defaultMinStock || 0}"></div>
      <div class="field"><label>Lagerort</label><input id="vLoc" value="${escapeHtml(cfg.defaultLocation || '')}"></div>
      <div class="field"><label>Anfangsbestand je Größe</label><input id="vStock" type="number" min="0" value="0"></div>
    </div>
    <div class="field"><label>Größen (eine pro Zeile oder kommagetrennt) *</label>
      <textarea id="vSizes" rows="4" placeholder="S&#10;M&#10;L&#10;XL&#10;XXL"></textarea>
    </div>
    <label style="display:flex;align-items:center;gap:8px;">
      <input type="checkbox" id="vPers" ${catInfo(cfg.defaultCategory).personal ? 'checked' : ''} style="width:auto;">
      Personenbezogene Zuordnung
    </label>
  `;
  div.querySelector('#vCat').onchange = () => {
    div.querySelector('#vPers').checked = !!catInfo(div.querySelector('#vCat').value).personal;
  };
  modal({
    title: 'Mehrere Größen anlegen',
    body: div,
    footer: [
      { label: 'Abbrechen', kind: 'sec', value: false },
      { label: 'Anlegen', value: true }
    ]
  }).then(ok => {
    if (!ok) return;
    const name = div.querySelector('#vName').value.trim();
    const rawSizes = div.querySelector('#vSizes').value;
    const sizes = rawSizes.split(/[\n,;]+/).map(x => x.trim()).filter(Boolean);
    if (!name || sizes.length === 0) { toast('Bezeichnung und mindestens eine Größe angeben.', 'error'); return; }
    const cat = div.querySelector('#vCat').value;
    const data = {
      category: cat,
      unit: div.querySelector('#vUnit').value,
      variant: div.querySelector('#vVar').value.trim() || null,
      minStock: parseInt(div.querySelector('#vMin').value) || 0,
      location: div.querySelector('#vLoc').value.trim() || null,
      personalAssignment: div.querySelector('#vPers').checked,
      lastPurchasePrice: null
    };
    const startStock = parseInt(div.querySelector('#vStock').value) || 0;
    let created = 0;
    for (const size of sizes) {
      const exists = state.articles.some(a => a.active !== false && a.internalName === name && (a.size || '') === size && (a.variant || '') === (data.variant || ''));
      if (exists) continue;
      const newArt = { id: nextId(), internalName: name, size, ...data, stock: startStock, active: true };
      state.articles.push(newArt);
      if (startStock > 0) {
        state.movements.push({
          id: nextId(), articleId: newArt.id, type: 'eingang',
          quantity: startStock, employeeId: null, importLineId: null,
          unitPrice: null, note: 'Anfangsbestand (Varianten)', occurredAt: todayISO()
        });
      }
      created++;
    }
    if (created === 0) { toast('Keine neuen Artikel — alle Kombinationen existieren schon.', 'error'); return; }
    audit('CREATE_ARTICLE_VARIANTS', 'article', null, null, { name, count: created });
    persist();
    toast(`${created} Artikel angelegt.`, 'success');
    navigate('articles');
  });
}

function downloadArticlesCsvTemplate() {
  if (!requirePermission('write')) return;
  const header = 'Bezeichnung;Kategorie;Größe;Variante;Einheit;Bestand;Mindestbestand;Lagerort;EK_netto';
  const rows = [
    'Schutzhandschuh Nitril;handschuhe;L;;Paar;24;30;Regal A1;0,89',
    'T-Shirt #E190;arbeitskleidung;M;Schwarz;Stück;0;5;Regal B1;31,89',
    'Gehörschutz;verbrauch;;;Stück;10;5;Regal C1;'
  ];
  downloadText('artikel-vorlage.csv', header + '\n' + rows.join('\n') + '\n', 'text/csv;charset=utf-8');
}

function parseCsvRow(line, sep) {
  const out = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (!inQ && ch === sep) { out.push(cur.trim()); cur = ''; continue; }
    cur += ch;
  }
  out.push(cur.trim());
  return out;
}

function renderArticlesImport() {
  if (!requirePermission('write', 'Nur Office & Admin dürfen Artikel importieren.')) return;
  const v = $('#view');
  v.innerHTML = `
    <p class="lead">Viele Artikel auf einmal per CSV/TXT — z. B. aus Excel exportiert (Trennzeichen <code>;</code>).</p>
    <div class="card">
      <div class="actions" style="margin-bottom:12px;">
        <button class="sec" onclick="downloadArticlesCsvTemplate()">Vorlage herunterladen</button>
        <button class="sec" onclick="navigate('articles')">← Zur Artikelliste</button>
      </div>
      <div class="field">
        <label>CSV-Datei</label>
        <input type="file" id="csvFile" accept=".csv,.txt,text/csv,text/plain">
      </div>
      <hr class="sep">
      <div class="field">
        <label>Oder CSV-Text einfügen</label>
        <textarea id="csvText" rows="12" placeholder="Bezeichnung;Kategorie;Größe;Variante;Einheit;Bestand;Mindestbestand;Lagerort;EK_netto"></textarea>
      </div>
      <div class="help">Spalten: Bezeichnung (Pflicht), Kategorie (Name oder ID), Größe, Variante, Einheit, Bestand, Mindestbestand, Lagerort, EK netto in €</div>
      <div class="actions">
        <button onclick="importArticlesFromCsv()">Artikel importieren</button>
      </div>
    </div>
  `;
  $('#csvFile').onchange = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { $('#csvText').value = r.result; };
    r.readAsText(f, 'utf-8');
  };
}

async function importArticlesFromCsv() {
  if (!requirePermission('write', 'Nur Office & Admin dürfen Artikel importieren.')) return;
  const text = ($('#csvText').value || '').trim();
  if (!text) { toast('CSV-Text einfügen oder Datei wählen.', 'error'); return; }
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return;
  const sep = lines[0].includes(';') ? ';' : ',';
  let start = 0;
  if (/bezeichnung/i.test(lines[0])) start = 1;
  const cfg = appSettings();
  const pending = [];
  let skipped = 0;
  for (let i = start; i < lines.length; i++) {
    const cols = parseCsvRow(lines[i], sep);
    const name = (cols[0] || '').trim();
    if (!name) { skipped++; continue; }
    const cat = resolveCategoryId(cols[1]);
    const size = (cols[2] || '').trim() || null;
    const variant = (cols[3] || '').trim() || null;
    const unit = (cols[4] || '').trim() || cfg.defaultUnit;
    const stock = parseInt(cols[5]) || 0;
    const minStock = parseInt(cols[6]) || cfg.defaultMinStock || 0;
    const location = (cols[7] || '').trim() || cfg.defaultLocation || null;
    const price = parseGermanNumber(cols[8]);
    const exists = state.articles.some(a => a.active !== false && a.internalName === name && (a.size || '') === (size || '') && (a.variant || '') === (variant || ''));
    if (exists) { skipped++; continue; }
    pending.push({ name, cat, size, variant, unit, stock, minStock, location, price });
  }
  if (pending.length === 0) {
    toast(`Keine neuen Artikel (${skipped} übersprungen).`, 'error');
    return;
  }
  if (!await confirmDialog(`${pending.length} Artikel importieren${skipped ? ` (${skipped} übersprungen)` : ''}?`)) return;
  for (const p of pending) {
    const newArt = {
      id: nextId(),
      internalName: p.name,
      category: p.cat,
      size: p.size,
      variant: p.variant,
      unit: p.unit,
      stock: p.stock,
      minStock: p.minStock,
      location: p.location,
      lastPurchasePrice: p.price != null ? toCents(p.price) : null,
      personalAssignment: !!catInfo(p.cat).personal,
      active: true
    };
    state.articles.push(newArt);
    if (p.stock > 0) {
      state.movements.push({
        id: nextId(), articleId: newArt.id, type: 'eingang',
        quantity: p.stock, employeeId: null, importLineId: null,
        unitPrice: newArt.lastPurchasePrice, note: 'CSV-Import', occurredAt: todayISO()
      });
    }
  }
  audit('IMPORT_ARTICLES_CSV', 'article', null, null, { created: pending.length, skipped });
  persist();
  toast(`${pending.length} Artikel importiert.`, 'success');
  navigate('articles');
}

function getDataHealthFindings() {
  const openImports = state.imports.filter(imp => imp.status !== 'confirmed' && imp.status !== 'cancelled');
  const unresolvedImportLines = state.importLines.filter(line => {
    const imp = state.imports.find(item => item.id === line.importId);
    return imp && imp.status !== 'confirmed' && imp.status !== 'cancelled' && !line.matchedArticleId;
  });
  const findings = [
    {
      severity: unresolvedImportLines.length ? 'red' : 'green',
      label: 'Offene Import-Positionen',
      count: unresolvedImportLines.length,
      detail: unresolvedImportLines.length ? 'Noch nicht zugeordnete Rechnungspositionen in der Prüfqueue.' : 'Alle offenen Importe sind zugeordnet.',
      href: '#imports'
    },
    {
      severity: openImports.length ? 'yellow' : 'green',
      label: 'Offene Importe',
      count: openImports.length,
      detail: openImports.length ? 'Importe warten noch auf Prüfung oder Buchung.' : 'Keine offenen Importe.',
      href: '#imports'
    },
    {
      severity: state.articles.filter(a => a.active !== false && !a.location).length ? 'yellow' : 'green',
      label: 'Artikel ohne Lagerort',
      count: state.articles.filter(a => a.active !== false && !a.location).length,
      detail: 'Diese Artikel erschweren die physische Lagerzuordnung.',
      href: '#articles'
    },
    {
      severity: state.articles.filter(a => a.active !== false && a.personalAssignment && !a.size).length ? 'yellow' : 'green',
      label: 'Personenartikel ohne Größe',
      count: state.articles.filter(a => a.active !== false && a.personalAssignment && !a.size).length,
      detail: 'Gerade Kleidung und Schuhe sollten eine Größe haben.',
      href: '#articles'
    },
    {
      severity: state.articles.filter(a => a.active !== false && !a.articleNumber).length ? 'yellow' : 'green',
      label: 'Artikel ohne Artikelnummer',
      count: state.articles.filter(a => a.active !== false && !a.articleNumber).length,
      detail: 'SKU/Artikelnummer verbessert Importtreffer und Nachbestellung.',
      href: '#articles'
    },
    {
      severity: state.suppliers.filter(s => !supplierTaxIdValue(s)).length ? 'yellow' : 'green',
      label: 'Lieferanten ohne USt-Id',
      count: state.suppliers.filter(s => !supplierTaxIdValue(s)).length,
      detail: 'Stammdaten für Lieferanten sind noch unvollständig.',
      href: '#suppliers'
    }
  ];
  return findings;
}

function exportData() {
  if (!requirePermission('export', 'Nur Office & Admin dürfen Daten exportieren.')) return;
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'lagerverwaltung-' + todayISO() + '.json';
  a.click(); URL.revokeObjectURL(url);
}

async function importData(input) {
  if (!requirePermission('admin', 'Nur Admins dürfen Daten importieren.')) { input.value=''; return; }
  const f = input.files[0]; if (!f) return;
  if (!await confirmDialog('Aktuelle Daten überschreiben?')) { input.value=''; return; }
  const r = new FileReader();
  r.onload = () => {
    try {
      const obj = JSON.parse(r.result);
      const err = validateImportedState(obj);
      if (err) {
        toast('Import abgelehnt: ' + err, 'error');
        return;
      }
      state = migrateData(obj);
      if (hasStraussProductionData(state)) state = applyCompanySeedData(state);
      initOnce();
      audit('DATA_IMPORT', 'system', null, null, { movements: state.movements.length, articles: state.articles.length });
      persist(); handleRoute();
      toast('Daten importiert und geprüft.', 'success');
    } catch (e) {
      toast('Ungültige Datei.', 'error');
    }
  };
  r.readAsText(f);
  input.value = '';
}

async function resetAllData() {
  if (!requirePermission('admin', 'Nur Admins dürfen alle Daten löschen.')) return;
  if (!await confirmDialog('Wirklich alle Daten löschen?')) return;
  audit('RESET_ALL', 'system', null, {records: state.movements.length}, null);

  toast('Alle Daten gelöscht.');
}

function initOnce() {

    { firstName: 'Francesco', lastName: '' },
    { firstName: 'Maurice',   lastName: '' },

    { firstName: 'Patricia',  lastName: '' },

  ];
  let empAdded = 0;
  for (const e of newEmployees) {
    const exists = state.employees.find(x => x.firstName.toLowerCase() === e.firstName.toLowerCase());
    if (!exists) {

  let supplier = state.suppliers.find(s => s.name.toLowerCase().includes('bandyshirt'));
  if (!supplier) {
    supplier = {
      id: nextId(), name: 'Bandyshirt GmbH',
      address: 'Rüppurerstr. 1, 76137 Karlsruhe',
      taxId: 'DE815700651', notes: null
    };
    state.suppliers.push(supplier);
  }

  // ── Import BSi042600160397 (nur einmalig anlegen) ──
  const existingImport = state.imports.find(i => i.invoiceNo === 'BSi042600160397');
  if (!existingImport) {
    const importId = nextId();
    state.imports.push({
      id: importId,

      supplierName: 'Bandyshirt GmbH',
      invoiceNo: 'BSi042600160397',

      status: 'parsed',
      createdAt: todayISO()
    });
    // Positionen: #E190 T-Shirt Schwarz M×7, L×7, XXL×5, à 31,89 € netto

  } else if (empAdded > 0) {
    saveData();
    console.log(`[initOnce] ${empAdded} Mitarbeiter hinzugefügt.`);

}
